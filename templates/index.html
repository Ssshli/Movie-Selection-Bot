<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КиноБот</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; width: 200px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 Подбор фильма</h1>
        
        <!-- Форма, которая отправляет данные в твой app.py -->
        <form method="POST">
            <input type="text" name="genre" placeholder="Жанр (комедия...)" required>
            

            <input type="text" name="country" placeholder="Страна (Россия,США,Германия,Франция)" required>
            

            <button type="submit">Найти фильм</button>
        </form>

        <!-- Тут Python покажет результат -->
        {% if result %}
            <div class="result">
                <h3>Рекомендую:</h3>
                <p>{{ result }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
